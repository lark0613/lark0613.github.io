<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }}</title>  <!-- 读取_config.yml的title -->
  <meta name="description" content="{{ page.description }}">  <!-- 读取描述 -->
  <!-- 引入字体和图标（无需下载，直接引用） -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- 引入自定义CSS -->
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <!-- 头像区域 -->
    <div class="avatar">
      <img src="https://picsum.photos/id/1005/200/200" alt="个人头像" />
      <!-- 图片是随机占位图，后续可替换成自己的头像URL -->
    </div>

    <!-- 个人信息区域 -->
    <div class="info">
      <h1>李 Lark</h1>
      <p class="tag">前端学习者 · 技术分享者 · 终身成长</p>
      <p class="intro">
        喜欢探索前端新技术，擅长 HTML/CSS/JavaScript，
        热衷于用代码实现有趣的交互效果，记录学习路上的每一步。
      </p>
    </div>

    <!-- 技能区域 -->
    <div class="skills">
      <h2><i class="fas fa-code"></i> 技能栈</h2>
      <div class="skill-tags">
        <span>HTML5</span>
        <span>CSS3</span>
        <span>JavaScript</span>
        <span>Git/GitHub</span>
        <span>响应式布局</span>
        <span>Jekyll</span>
      </div>
    </div>

    <!-- 联系方式区域 -->
    <div class="contact">
      <h2><i class="fas fa-paper-plane"></i> 联系我</h2>
      <div class="contact-links">
        <a href="https://github.com/lark0613" target="_blank" class="link">
          <i class="fab fa-github"></i> GitHub
        </a>
        <a href="mailto:your-email@example.com" class="link">
          <i class="fas fa-envelope"></i> 邮箱
        </a>
      </div>
    </div>

    <!-- 页脚 -->
    <footer>
      <p>&copy; 2024 李 Lark.  All rights reserved.</p>
    </footer>
  </div>
</body>
</html>
